services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: satellite_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/SatelliteTracker.Presentation/Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: satellite_tracker
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
    env_file:
      - .env.development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: frontend/satellite-tracker-ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:5000
    depends_on:
      - api

volumes:
  pgdata:
